<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ser2tcp</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-view" class="login-box hidden">
  <h1>ser2tcp</h1>
  <div class="section">
    <h2>Login</h2>
    <div id="login-error" class="error hidden"></div>
    <input id="login-user" type="text" placeholder="Login" autocomplete="username">
    <input id="login-pass" type="password" placeholder="Password" autocomplete="current-password">
    <button class="btn-primary" id="login-btn">Login</button>
  </div>
</div>

<div id="app" class="hidden">
  <header>
    <h1>ser2tcp</h1>
    <div class="user-info hidden" id="user-info">
      <span id="user-name"></span>
      <button id="logout-btn">Logout</button>
    </div>
  </header>
  <nav>
    <button class="active" data-tab="status">Status</button>
    <button data-tab="ports">Available ports</button>
    <button data-tab="users">Users</button>
  </nav>

  <div id="tab-status"><div id="status-content"></div></div>
  <div id="tab-ports" class="hidden"><div id="ports-content"></div></div>
  <div id="tab-users" class="hidden">
    <div id="users-content"></div>
    <div class="toolbar">
      <h3>Add user</h3>
      <input id="new-login" type="text" placeholder="Login" autocomplete="off">
      <input id="new-pass" type="password" placeholder="Password" autocomplete="new-password">
      <label><input id="new-admin" type="checkbox" checked disabled> Admin</label>
      <button class="btn-primary" id="add-user-btn">Add</button>
      <div id="user-error" class="error hidden"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
